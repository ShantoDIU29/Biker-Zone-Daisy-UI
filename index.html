<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biker Zone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.5/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            poppins: ["Poppins", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>
<body class="font-poppins bg-base-200">
  <!-- header section -->

  <header class="bg-base-100 shadow-sm"> 
    <div class="navbar mx-auto max-w-7xl px-4 lg:px-8">
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden" aria-label="Open navigation menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
            </svg>
          </div>
          <ul
            tabindex="0"
            class="menu menu-sm dropdown-content rounded-box z-10 mt-3 w-52 bg-base-100 p-2 shadow">
            <li><a href="#home">Home</a></li>
            <li><a href="#shop">Shop</a></li>
            <li><a href="#contact">Contact</a></li>
          </ul>
        </div>
        <a href="#home" class="btn btn-ghost px-0 text-xl font-bold text-neutral">Biker Zone</a>
      </div>
      <div class="navbar-center hidden lg:flex">
        <ul class="menu menu-horizontal gap-2 px-1 text-base font-medium text-neutral">
          <li><a href="#home">Home</a></li>
          <li><a href="#shop">Shop</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </div>
      <div class="navbar-end">
        <a href="#shop" class="btn btn-error text-white">Shop Now</a>
      </div>
    </div>
  </header>
  <!-- main section -->
  <main>
    <section id="home" class="mx-auto max-w-7xl px-4 py-16 lg:px-8">
      <div class="hero rounded-3xl bg-base-100 px-6 py-12 shadow-lg lg:px-12">
        <div class="hero-content flex-col gap-10 lg:flex-row-reverse">
          <img src="./images/slider/bike1.png" class="w-full max-w-lg" alt="Red sport bike">
          <div>
            <h1 class="text-4xl font-bold leading-tight lg:text-6xl">Ride with confidence and style.</h1>
            <p class="py-6 text-base-content/70">
              Premium bikes, trusted gear, and a smoother shopping experience for every rider.
            </p>
            <a href="#shop" class="btn btn-error text-white">Browse Bikes</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <!-- footer section -->
  <footer id="contact" class="border-t border-base-300 bg-base-100">
    <div class="mx-auto max-w-7xl px-4 py-6 text-center text-sm text-base-content/70 lg:px-8">
      Contact us at support@bikerzone.com
    </div>
  </footer>
</body>
</html>
